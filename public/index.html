<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
            canvas { border: 3px solid white; background-color: #111; }
        </style>
        <link rel="stylesheet" href="./game.css">
        <link rel="icon" type="image/png" href="./images/favicon.png">
    </head>
    <body>
        <h1 id="title">Online</h1>

        <form id="authPanel" class="auth-panel" onsubmit="return false;">
            <div id="messages" class="auth-message"></div>
            <input id="nameInput" name="username" autocomplete="username" placeholder="Enter name" class="auth-input" />
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="Enter password" class="auth-input" />
            <div class="auth-buttons">
                <button type="button" id="registerBtn" class="auth-button">Register</button>
                <button type="button" id="loginBtn" class="auth-button">Login</button>
            </div>
        </form>

        <div id="homePanel" class="home-panel" style="display:none;">
            <div id="homeUsername" class="home-username"></div>
            <button id="practiceBtn" class="auth-button practice-button">Practice</button>
            <button id="matchmakingBtn" class="auth-button matchmaking-button">Matchmaking</button>
            <button id="leaderboardBtn" class="auth-button leaderboard-button">Leaderboard</button>
        </div>

        <div id="battlePanel" class="battle-panel" style="display:none;">
            <div class="battle-header">
                <div id="battleUsername" class="battle-username"></div>
                <div id="cooldownHud" class="cooldown-hud">
                    <span>Q: <span id="QCooldown">Ready</span></span>
                    <span>E: <span id="ECooldown">Ready</span></span>
                    <span>F: <span id="FCooldown">Ready</span></span>
                    <span>R: <span id="RCooldown">Ready</span></span>
                    <span>C: <span id="CCooldown">Ready</span></span>
                </div>
            </div>
            <canvas id="gameCanvas" width="900" height="700"></canvas>
        </div>

        <div id="gameOverOverlay" class="game-over-overlay" style="display:none;">
            <div class="game-over-card">
                <h2>Game Over</h2>
                <p id="gameOverText">You have been defeated.</p>
                <div class="game-over-buttons">
                    <button id="homeBtn" class="auth-button game-over-home-button">Back to Homepage</button>
                </div>
            </div>
        </div>

        <div id="leaderboardOverlay" class="leaderboard-overlay" style="display:none;">
            <div class="leaderboard-card">
                <h2>Leaderboard</h2>
                <div id="leaderboardContent" class="leaderboard-content"></div>
                <button id="closeLeaderboardBtn" class="auth-button leaderboard-close-button">Close</button>
            </div>
        </div>

        <div id="matchmakingOverlay" class="matchmaking-overlay" style="display:none;">
            <div class="matchmaking-card">
                <h2>Finding Opponent...</h2>
                <p id="matchmakingStatus">Searching for players...</p>
                <button id="cancelMatchmakingBtn" class="auth-button matchmaking-cancel-button">Cancel</button>
            </div>
        </div>

        <script src="./auth.js"></script>
        <script src="/socket.io/socket.io.js"></script>
        <script src="./game.js"></script>

    </body>
</html>
